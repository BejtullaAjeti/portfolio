<div id="contact">
  <div class="inner">
    <div class="section-label">Contact</div>
    <div class="contact-layout">
      <div appReveal>
        <h2 class="contact-heading">
          Let's build<br>something<br><em>great.</em>
        </h2>
        <a class="email-cta" [href]="'mailto:' + personal.email">
          Send me an email <span class="arrow">↗</span>
        </a>
      </div>
      <div class="contact-details" appReveal>
        <div class="contact-row">
          <span class="contact-label">Email</span>
          <span class="contact-value">
            <a [href]="'mailto:' + personal.email">{{ personal.email }}</a>
          </span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Phone</span>
          <span class="contact-value">{{ personal.phone }}</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Location</span>
          <span class="contact-value">{{ personal.location }} · Remote-ready, no visa required</span>
        </div>
        <div class="contact-row">
          <span class="contact-label">GitHub</span>
          <span class="contact-value">
            <a [href]="personal.links.github" target="_blank" rel="noopener">github.com/BejtullaAjeti</a>
          </span>
        </div>
        <div class="contact-row">
          <span class="contact-label">LinkedIn</span>
          <span class="contact-value">
            <a [href]="personal.links.linkedin" target="_blank" rel="noopener">linkedin.com/in/bejtulla-ajeti</a>
          </span>
        </div>
        <div class="contact-row">
          <span class="contact-label">Game Portfolio</span>
          <span class="contact-value">
            <a [href]="personal.links.itchio" target="_blank" rel="noopener">b1t0o.itch.io</a>
          </span>
        </div>
      </div>
    </div>
  </div>
</div>
